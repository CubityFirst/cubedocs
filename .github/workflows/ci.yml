name: CI

on:
  pull_request:
  push:
    branches: [main]

# A new push to a branch cancels the in-flight run for that same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up BEFORE setup-node so the pnpm store cache resolves.
      # Version is taken from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # The four packages with vitest unit suites. e2e (Playwright) is excluded
      # on purpose: it has no webServer block, so it needs the full local stack
      # (vite + 3 workers + seeded D1) plus browsers — a separate job, later.
      #
      # --workspace-concurrency=1 runs the packages one at a time: several vitest
      # instances at once oversubscribe a 2-core runner and crash worker processes
      # (whole suites report as failed). The api package's live-stack integration
      # suites are excluded from this run via packages/api/vitest.config.ts and
      # run separately with `pnpm --filter @annex/api test:integration`.
      - name: Unit tests
        run: pnpm --workspace-concurrency=1 --filter @annex/api --filter @annex/auth --filter @annex/frontend --filter @annex/admin run test
