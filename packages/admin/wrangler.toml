name = "annex-admin"
main = "src/index.ts"
compatibility_date = "2024-12-30"

[assets]
directory = "./dist"
binding = "SITE_ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "cubedocs-main"
database_id = "267490be-7141-4d00-ab23-152742f2f6ef"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "cubedocs-auth"
database_id = "db327d85-b8c2-4fed-adaa-25e748778c86"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "cubedocs-assets"

[[services]]
binding = "AUTH"
service = "annex-auth"

[[routes]]
pattern = "admin.cubityfir.st"
custom_domain = true

[vars]
# Cloudflare-for-SaaS custom domains — used to release a site's custom hostname
# when an admin removes a domain or deletes the site (mirrors the api worker).
# MUST match the api worker's values (the dedicated yourannex.com zone — see
# memories/Custom-Domains.md), and CF_API_TOKEN must be scoped to that zone.
# When CF_ZONE_ID / CF_API_TOKEN are unset, the CF call is a safe no-op (the DB
# row is still removed).
CF_ZONE_ID = "397deb54a68d306201a295d1793fe84c"
CUSTOM_DOMAIN_CNAME_TARGET = "cname.yourannex.com"

[[unsafe.bindings]]
name = "RATE_LIMITER_ADMIN"
type = "ratelimit"
namespace_id = "2001"
# IP-keyed coarse abuse cap across every authenticated admin API route.
# Generous enough for an operator clicking around the dashboard; only
# bites scripted abuse with a stolen admin token.
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_ADMIN_HANDOFF"
type = "ratelimit"
namespace_id = "2002"
# Tighter, separate bucket for the unauthenticated handoff-exchange
# proxy (the only pre-auth endpoint that hits the auth worker + DB).
simple = { limit = 10, period = 60 }

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET         (same value as the auth worker's JWT_SECRET — the
#                       admin worker verifies sessions inline against
#                       AUTH_DB instead of calling auth's /verify route)
#   STRIPE_SECRET_KEY  (sk_test_... or sk_live_... — same value as auth
#                       worker; only used for admin-driven cancellations
#                       triggered from the user details panel)
#   CF_API_TOKEN       (same token as the api worker — zone-scoped, SSL and
#                       Certificates: Edit; only used to release a custom
#                       hostname on admin-driven site delete)
