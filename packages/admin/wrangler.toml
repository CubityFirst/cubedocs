name = "cubedocs-admin"
main = "src/index.ts"
compatibility_date = "2024-12-30"

[assets]
directory = "./frontend/dist"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "cubedocs-main"
database_id = "267490be-7141-4d00-ab23-152742f2f6ef"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "cubedocs-auth"
database_id = "db327d85-b8c2-4fed-adaa-25e748778c86"

[[routes]]
pattern = "admin.cubityfir.st"
custom_domain = true
