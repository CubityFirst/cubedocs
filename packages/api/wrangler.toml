name = "annex-api"
main = "src/index.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[[durable_objects.bindings]]
name = "DOC_COLLAB"
class_name = "DocCollabRoom"

[[migrations]]
tag = "v1"
new_classes = ["DocCollabRoom"]

[[d1_databases]]
binding = "DB"
database_name = "cubedocs-main"
database_id = "267490be-7141-4d00-ab23-152742f2f6ef"
migrations_dir = "migrations"

# Read-only access to the auth DB so this worker can verify sessions inline
# (one D1 batch read of users + sessions) instead of round-tripping through
# the auth worker's /verify route on every request. Migrations live with the
# auth worker — DO NOT add migrations_dir here.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "cubedocs-auth"
database_id = "db327d85-b8c2-4fed-adaa-25e748778c86"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "cubedocs-assets"

# Service binding to auth worker (zero-latency internal calls)
[[services]]
binding = "AUTH"
service = "annex-auth"

[vars]
ENVIRONMENT = "production"
# Cloudflare for SaaS custom domains (see memories/Custom-Domains.md). These live
# on the DEDICATED `yourannex.com` zone, kept separate from cubityfir.st so the
# SaaS `*/*` catch-all route can't shadow our own hosts (it once hijacked
# i.cubityfir.st). CUSTOM_DOMAIN_CNAME_TARGET is the proxied hostname customers
# CNAME their domain to; CF_ZONE_ID is the yourannex.com zone id. When CF_ZONE_ID
# or CF_API_TOKEN is unset, the custom-domain endpoints report "not configured"
# and never call Cloudflare.
CUSTOM_DOMAIN_CNAME_TARGET = "publish.yourannex.com"
CF_ZONE_ID = "397deb54a68d306201a295d1793fe84c"

# Direct-from-R2 presigned video streaming (see lib/r2Presign.ts). The bucket
# name matches the [[r2_buckets]] binding above. Set R2_ACCOUNT_ID to your CF
# account id, and the two secrets via:
#   npx wrangler secret put R2_ACCESS_KEY_ID
#   npx wrangler secret put R2_SECRET_ACCESS_KEY
# (create an R2 API token with Object Read for cubedocs-assets). When any of the
# four is unset, video falls back to the in-Worker token streaming route.
R2_BUCKET_NAME = "cubedocs-assets"
# R2_ACCOUNT_ID = "<your-cloudflare-account-id>"

# Per-user limiter for the invite-by-email lookup. The auth worker's
# /lookup also has its own coarser IP-keyed limiter — this one caps any
# single account from scraping the email→user map even when multiple
# users share an IP (office NAT).
# GA [[ratelimits]] binding (not the deprecated [[unsafe.bindings]] form) —
# same behavior, but simulated locally in wrangler dev. See auth wrangler.toml.
[[ratelimits]]
name = "RATE_LIMITER_INVITE_LOOKUP"
namespace_id = "2001"
simple = { limit = 8, period = 60 }

# Per-API-key limiter for the public /v1 surface, keyed by `apikey:<id>`.
# Caps abuse / runaway scripts on a single scoped key without touching the
# interactive JWT routes.
[[ratelimits]]
name = "RATE_LIMITER_API"
namespace_id = "2002"
simple = { limit = 120, period = 60 }

[[flagship]]
binding = "FLAGS"
app_id = "08fb610f-b8ed-4a60-afcf-7f5fe6b9f948"

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET      (same value as auth worker — used for local JWT verification)
#   OPENAI_API_KEY  (OpenAI API key for AI summarisation feature)
#   CF_API_TOKEN    (Cloudflare token scoped to the zone with "SSL and
#                    Certificates: Edit" — used to create/poll custom hostnames)
