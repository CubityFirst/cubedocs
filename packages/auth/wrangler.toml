name = "cubedocs-auth"
main = "src/index.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "cubedocs-auth"
database_id = "db327d85-b8c2-4fed-adaa-25e748778c86"
migrations_dir = "migrations"

[vars]
JWT_ISSUER = "https://auth.cubedocs.com"

[[routes]]
pattern = "auth.docs.cubityfir.st"
custom_domain = true

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET
