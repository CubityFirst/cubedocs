name = "annex-auth"
main = "src/index.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[[d1_databases]]
binding = "DB"
database_name = "cubedocs-auth"
database_id = "db327d85-b8c2-4fed-adaa-25e748778c86"
migrations_dir = "migrations"

[triggers]
# Weekly sweep of long-dead session rows (see scheduled handler).
crons = ["0 3 * * SUN"]

# "Sign in with Annex" OIDC provider — public endpoints on a DEDICATED identity
# host so the issuer is decoupled from the app origin (docs.cubityfir.st), which
# may migrate. Only /oauth/* and /.well-known/* are exposed here; nothing else on
# the auth worker is reachable at auth.cubityfir.st. Requires a proxied DNS record
# for `auth.cubityfir.st` on the cubityfir.st zone (see docs/oauth/README.md).
# The browser-facing authorization page lives on the app origin (OIDC_AUTHORIZE_URL).
[[routes]]
pattern = "auth.cubityfir.st/oauth/*"
zone_name = "cubityfir.st"

[[routes]]
pattern = "auth.cubityfir.st/.well-known/*"
zone_name = "cubityfir.st"

[vars]
JWT_ISSUER = "https://auth.cubedocs.com"
ADMIN_APP_ORIGIN = "https://admin.cubityfir.st"
APP_ORIGIN = "https://docs.cubityfir.st"
# "Sign in with Annex" OIDC provider. OIDC_ISSUER is the `iss` of every token and
# the base for discovery (https://auth.cubityfir.st/.well-known/openid-configuration).
# OIDC_AUTHORIZE_URL is the browser-facing authorize page on the app origin (the
# user's Annex session lives there, not on the issuer host).
OIDC_ISSUER = "https://auth.cubityfir.st"
OIDC_AUTHORIZE_URL = "https://docs.cubityfir.st/oauth/authorize"
WEBAUTHN_RP_ID = "docs.cubityfir.st"
WEBAUTHN_RP_NAME = "Annex"
WEBAUTHN_ORIGIN = "https://docs.cubityfir.st"
REQUIRE_EMAIL_VERIFICATION = "false"
# Stripe price id for the Annex Ink supporter tier ($5/mo recurring).
# Not a secret — safe to commit. Set the live id once the Stripe product
# is created in the dashboard.
STRIPE_INK_PRICE_ID = "price_1TVJk5Rckd4Ls9nPHpnY4tAN"

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["noreply@docs.cubityfir.st"]

[[unsafe.bindings]]
name = "RATE_LIMITER_LOOKUP"
type = "ratelimit"
namespace_id = "1001"
# Coarse abuse cap, IP-keyed. Per-user limiting for authenticated callers
# happens on the API worker (see RATE_LIMITER_INVITE_LOOKUP there).
simple = { limit = 30, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_EMAIL_VERIFY"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 3, period = 60 }

# OIDC token endpoint (/oauth/token). Server-to-server, so a single connected
# service exchanges every user's code from one egress IP — needs a far higher
# ceiling than the interactive login limiter. IP-keyed (CF-Connecting-IP is real
# on the directly-routed auth.cubityfir.st host).
[[unsafe.bindings]]
name = "RATE_LIMITER_OIDC"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 100, period = 60 }

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET
#   TURNSTILE_SECRET
#   STRIPE_SECRET_KEY      (sk_test_... or sk_live_...)
#   STRIPE_WEBHOOK_SECRET  (whsec_... — generated by Stripe when you
#                           register the /stripe/webhook endpoint)
#   OIDC_PRIVATE_KEY       (RS256 signing key — RSA private JWK as a JSON string.
#                           Generate with `node scripts/gen-oidc-key.mjs`. The
#                           public half is published at /oauth/jwks.)
