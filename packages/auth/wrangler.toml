name = "cubedocs-auth"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "cubedocs-auth"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
JWT_ISSUER = "https://auth.cubedocs.com"

[[custom_domains]]
pattern = "auth.docs.cubityfir.st"

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET
