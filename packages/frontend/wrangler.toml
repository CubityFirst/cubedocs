name = "annex-frontend"
main = "worker/index.ts"
compatibility_date = "2026-02-24"

[assets]
directory = "./dist"
binding = "ASSETS"

[[services]]
binding = "API"
service = "annex-api"

# Service binding to the auth worker — used only for Stripe webhook
# forwarding (/stripe/webhook). The auth worker is otherwise reached
# via the api worker's own AUTH binding for authenticated calls.
[[services]]
binding = "AUTH"
service = "annex-auth"

[[routes]]
pattern = "docs.cubityfir.st"
custom_domain = true

# Cloudflare-for-SaaS fallback route: catches every custom hostname that
# customers CNAME to docs.cubityfir.st (and any other host on the zone without a
# more-specific route) and serves it from this worker in host-mode. Required for
# custom domains to resolve — without it, arbitrary SaaS hostnames have no Worker
# route, fall through to the originless fallback origin, and return 522.
# Exact custom_domain routes (docs/admin.cubityfir.st) take precedence over this.
[[routes]]
pattern = "*/*"
zone_name = "cubityfir.st"
