name = "cubedocs-frontend"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Serve static assets from the /public directory
[assets]
directory = "./public"

# Service bindings for SSR data fetching (optional — can also use fetch())
[[services]]
binding = "API"
service = "cubedocs-api"

[vars]
API_BASE_URL = "https://api.cubedocs.com"
